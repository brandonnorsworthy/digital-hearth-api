services:
  api:
    build:
      context: .
      dockerfile: DigitalHearth.Api/Dockerfile
    container_name: digitalhearth-api
    env_file:
      - .env
    ports:
      - "3020:8080"
    volumes:
      - keys_data:/app/keys
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 512m
    cpus: 1
    networks:
      - shared-postgres

volumes:
  keys_data:

networks:
  shared-postgres:
    external: true
