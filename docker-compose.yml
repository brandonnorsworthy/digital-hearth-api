services:
  api:
    build:
      context: .
      dockerfile: DigitalHearth.Api/Dockerfile
    container_name: digitalhearth-api
    env_file:
      - .env
    environment:
      - ConnectionStrings__Default=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "3020:8080"
    volumes:
      - keys_data:/app/keys
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 512m
    cpus: 1

volumes:
  keys_data:
